<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly - Dictionary SPA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Wordly Dictionary</h1>
        
        <form id="search-form">
            <input type="text" id="word-input" placeholder="Enter a word..." required>
            <button type="submit">Search</button>
        </form>

        <div id="error-message" class="hidden"></div>

        <main id="result-display" class="hidden">
            <div class="header">
                <h2 id="word-title"></h2>
                <button id="audio-btn">🔊 Listen</button>
            </div>
            <p id="phonetic-text"></p>
            <div id="meaning-content"></div>
        </main>
    </div>
    <script src="index.js"></script>
</body>
</html>
